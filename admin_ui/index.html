
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryePro Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white min-h-screen p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    KuryePro Yönetim
                </h1>
                <p class="text-gray-400 text-sm mt-1">Gelişmiş Cihaz Kontrol Sistemi</p>
            </div>
            <div id="statusIndicator" class="hidden px-4 py-2 bg-green-900/30 text-green-400 rounded-full text-xs font-bold border border-green-500/20">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>GitHub ile Senkronize
            </div>
        </div>

        <!-- Add New Device -->
        <div class="bg-card rounded-2xl p-6 mb-8 border border-gray-700 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-indigo-400"></i> Yeni Cihaz Ekle
            </h2>
            <div class="flex gap-4">
                <input type="text" id="newDeviceId" placeholder="Cihaz Kimliği (UUID) Örn: 123e4567..." 
                    class="flex-1 bg-dark border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-colors">
                <button onclick="addDevice()" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-check mr-2"></i>EKLE
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2 ml-1">Kullanıcı "Erişim Engellendi" hatası aldığında size bu kodu gönderecektir.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Active Devices -->
            <div class="bg-card rounded-2xl border border-gray-700 shadow-xl overflow-hidden">
                <div class="bg-emerald-900/20 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h2 class="font-bold text-emerald-400 flex items-center gap-2">
                        <i class="fa-solid fa-shield-check"></i> Aktif Cihazlar
                    </h2>
                    <span id="activeCount" class="bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded text-xs font-bold">0</span>
                </div>
                <div id="activeList" class="p-4 space-y-3 max-h-[400px] overflow-y-auto">
                    <!-- JS populate -->
                </div>
            </div>

            <!-- Banned Devices -->
            <div class="bg-card rounded-2xl border border-gray-700 shadow-xl overflow-hidden">
                <div class="bg-red-900/20 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h2 class="font-bold text-red-400 flex items-center gap-2">
                        <i class="fa-solid fa-ban"></i> Yasaklılar
                    </h2>
                    <span id="bannedCount" class="bg-red-500/20 text-red-300 px-2 py-1 rounded text-xs font-bold">0</span>
                </div>
                <div id="bannedList" class="p-4 space-y-3 max-h-[400px] overflow-y-auto">
                    <!-- JS populate -->
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
        <div class="bg-card p-8 rounded-3xl text-center border border-gray-700">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-4"></i>
            <h3 class="text-xl font-bold">İşleniyor...</h3>
            <p class="text-gray-400 text-sm mt-2">GitHub güncelleniyor, lütfen bekleyin.</p>
        </div>
    </div>

    <script>
        // Verileri Yükle
        async function loadData() {
            const res = await fetch('/api/devices');
            const data = await res.json();
            render(data);
        }

        function render(data) {
            // Count
            document.getElementById('activeCount').innerText = data.active_devices.length;
            document.getElementById('bannedCount').innerText = data.banned_devices.length;

            // Active List
            const activeContainer = document.getElementById('activeList');
            if(data.active_devices.length === 0) activeContainer.innerHTML = '<p class="text-gray-500 text-sm text-center italic">Liste boş</p>';
            else activeContainer.innerHTML = data.active_devices.map(id => `
                <div class="flex items-center justify-between bg-dark p-3 rounded-lg border border-gray-700 hover:border-gray-500 transition-colors group">
                    <div class="flex items-center gap-3 overflow-hidden ml-1">
                        <i class="fa-solid fa-mobile-screen text-gray-500"></i>
                        <span class="text-sm font-mono text-gray-300 truncate w-32 md:w-48" title="${id}">${id}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${id}', 'ban')" class="w-8 h-8 rounded-lg bg-red-900/30 text-red-400 hover:bg-red-600 hover:text-white transition-all shadow-lg" title="Yasakla"><i class="fa-solid fa-ban"></i></button>
                        <button onclick="updateStatus('${id}', 'delete')" class="w-8 h-8 rounded-lg bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all" title="Sil"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Banned List
            const bannedContainer = document.getElementById('bannedList');
            if(data.banned_devices.length === 0) bannedContainer.innerHTML = '<p class="text-gray-500 text-sm text-center italic">Liste boş</p>';
            else bannedContainer.innerHTML = data.banned_devices.map(id => `
                <div class="flex items-center justify-between bg-dark p-3 rounded-lg border border-red-900/30 group">
                    <div class="flex items-center gap-3 overflow-hidden ml-1">
                        <i class="fa-solid fa-user-slash text-red-500"></i>
                        <span class="text-sm font-mono text-gray-400 truncate w-32 md:w-48 line-through decoration-red-500/50" title="${id}">${id}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${id}', 'allow')" class="w-8 h-8 rounded-lg bg-emerald-900/30 text-emerald-400 hover:bg-emerald-600 hover:text-white transition-all shadow-lg" title="Affet"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="updateStatus('${id}', 'delete')" class="w-8 h-8 rounded-lg bg-gray-800 text-gray-400 hover:bg-gray-700 transition-all" title="Sil"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(deviceId, action) {
            showLoading(true);
            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action, deviceId })
                });
                const result = await res.json();
                if(result.success) render(result.data);
                else alert('Hata: ' + result.error);
            } catch(e) {
                alert('Bağlantı Hatası');
            }
            showLoading(false);
        }

        function addDevice() {
            const id = document.getElementById('newDeviceId').value.trim();
            if(!id) return alert("Lütfen kod giriniz.");
            updateStatus(id, 'add');
            document.getElementById('newDeviceId').value = '';
        }

        function showLoading(show) {
            const modal = document.getElementById('loadingModal');
            if(show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        }

        // Başlangıç
        loadData();
    </script>
</body>
</html>
