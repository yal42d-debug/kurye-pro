<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Giriş Yap - KuryePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
      }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="text-center p-6">
        <h1 class="text-2xl font-bold mb-4">Giriş Yapılıyor...</h1>
        <p class="text-gray-400 mb-4">Lütfen bekleyin, uygulama açılacak.</p>
        <div id="status" class="mt-4 text-sm text-yellow-400 font-mono break-all">Bağlanıyor...</div>
        <div id="manualActions" class="hidden mt-6">
            <button onclick="retryLogin()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded mb-2">Tekrar
                Dene</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "firebase/auth";
        import { getDatabase, ref, set } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyBfN1-OQUQgQTu358UO6aZ-BDIbjWZq1Mc",
            authDomain: "kuryeprov44.firebaseapp.com",
            projectId: "kuryeprov44",
            databaseURL: "https://kuryeprov44-default-rtdb.firebaseio.com",
            appId: "1:177653241936:web:4130a534c4bf7cb05fd955"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const provider = new GoogleAuthProvider();
        provider.addScope('email');
        provider.addScope('profile');

        const statusEl = document.getElementById('status');

        window.retryLogin = () => doLogin();

        async function doLogin() {
            try {
                statusEl.innerText = "Google Popup Açılıyor...";
                statusEl.className = "mt-4 text-sm text-yellow-400";

                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                statusEl.innerText = "Token alınıyor...";

                // Hem ID Token hem Access Token alalım
                const credential = GoogleAuthProvider.credentialFromResult(result);
                const accessToken = credential?.accessToken;
                const idToken = await user.getIdToken();

                // Güvenli Köprü: Token'ı Veritabanına Yaz
                // Rastgele kod oluştur
                const tempCode = 'bridge_' + Math.random().toString(36).substr(2, 9) + Date.now();

                statusEl.innerText = "Güvenli transfer kodu oluşturuluyor...";

                // Temp Code ile kaydet
                await set(ref(db, 'temp_auth_tokens/' + tempCode), {
                    uid: user.uid,
                    idToken: idToken,
                    accessToken: accessToken || null,
                    timestamp: Date.now()
                });

                statusEl.innerText = "Yönlendiriliyor...";

                // Deep Link (Sadece KOD gönderiyoruz, çok kısa)
                const deepLink = `kuryepro://auth?auth_code=${tempCode}`;

                console.log("Redirecting to:", deepLink);

                // Yönlendir
                window.location.href = deepLink;

                setTimeout(() => {
                    statusEl.innerText = "Otomatik yönlendirme olmadıysa butona basın:";
                    statusEl.className = "mt-4 text-sm text-green-400";
                    document.body.innerHTML += `
                        <div class="mt-4">
                            <a href="${deepLink}" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold block w-full text-center">Uygulamayı Aç</a>
                        </div>
                    `;
                }, 1500);

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Hata: " + error.message;
                statusEl.className = "mt-4 text-sm text-red-500 font-bold bg-white p-2 rounded";
                document.getElementById('manualActions').classList.remove('hidden');
            }
        }

        doLogin();
    </script>
</body>

</html>
